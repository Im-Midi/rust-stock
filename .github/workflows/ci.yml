name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-test:
    name: cargo test (Rust 单测)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 在 Linux 上编译需要的系统库
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-stock/src-tauri

      - name: Run tests
        run: cargo test --manifest-path rust-stock/src-tauri/Cargo.toml

  frontend-syntax:
    name: node --check (前端模块语法)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check all ES modules
        run: |
          set -e
          for f in $(find rust-stock/src -name "*.js"); do
            node --input-type=module --check < "$f"
            echo "ok: $f"
          done
